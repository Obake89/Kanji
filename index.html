<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaniKani Kanji Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --success-color: #10b981;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-settings {
            background: transparent;
            color: var(--text-color);
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 14px;
            color: #94a3b8;
        }

        input[type="text"], textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            width: 100%;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        textarea {
            resize: none;
            height: 110px;
        }

        .kanji-display-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }

        .kanji-large {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.5);
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
        }

        .kanji-info {
            font-size: 14px;
            color: #94a3b8;
        }

        button {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Settings overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-body input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            width: 100%;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        .combination-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }

        .combination-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            background: rgba(15, 23, 42, 0.4);
            font-size: 15px;
            text-align: left;
        }

        .combination-table tr:last-child td {
            border-bottom: none;
        }

        .combination-table tr:hover td {
            background: rgba(15, 23, 42, 0.6);
        }

        .db-table th, .db-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .db-table th {
            background: #1e293b;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .db-table tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Kanji WaniKani Overlay</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="dbBtn" style="background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; width: auto; cursor: pointer; display: flex; align-items: center; gap: 4px;">🗂️ Baza</button>
                <button id="settingsBtn" class="btn-settings" aria-label="Ustawienia">⚙️</button>
            </div>
        </header>

        <!-- Karta 1: Wyszukiwanie -->
        <div class="card">
            <div class="card-title">1. Wyszukaj Kanji</div>
            <div class="input-group">
                <input type="text" id="kanjiInput" placeholder="Wpisz lub wklej Kanji (np. 水)" autocomplete="off">
            </div>
            <button id="searchBtn">🔍 Szukaj w WaniKani</button>
        </div>

        <!-- Kontener na wyniki wyszukiwania (dynamiczne karty) -->
        <div id="resultsContainer"></div>
    </div>

    <!-- Ustawienia Modal -->
    <div id="settingsOverlay" class="overlay">
        <div class="modal">
            <div class="modal-title">Ustawienia Google Sheets</div>
            <div class="modal-body">
                <label for="scriptUrlInput">https://script.google.com/macros/s/AKfycbyIFKO8QSCK69kOJnyyM-iLfKx4Bc70bjZVvaRPrrKXsfSRBt6L_4jpIVifIuZJ8c_jHw/exec</label>
                <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="closeSettingsBtn">Anuluj</button>
                <button id="saveSettingsBtn">Zapisz</button>
            </div>
        </div>
    </div>

    <!-- Baza Modal -->
    <div id="dbOverlay" class="overlay">
        <div class="modal" style="max-width: 90%; width: 850px; max-height: 85vh; display: flex; flex-direction: column; padding: 20px;">
            <div class="modal-title" style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span>Baza danych Kanji</span>
                    <button id="refreshDbBtn" style="background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; width: auto; font-weight: normal; display: flex; align-items: center; gap: 4px;">🔄 Odśwież</button>
                </div>
                <button class="btn-settings" id="closeDbBtn" style="font-size: 18px; padding: 0;">❌</button>
            </div>
            <div style="overflow-x: auto; overflow-y: auto; flex: 1; margin-bottom: 16px; border-radius: 8px; border: 1px solid var(--border-color);">
                <table class="db-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                    <thead>
                        <tr style="background: rgba(15, 23, 42, 0.9); border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 10;">
                            <th style="padding: 10px; font-weight: 600; text-align: left;">Kanji</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">Komentarz</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">D</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">E</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">F</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">G</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">H</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">I</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left; min-width: 140px;">Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody">
                        <!-- Generowane dynamicznie -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Komentarz zapisany w arkuszu!</div>

    <script>
        const kanjiInput = document.getElementById('kanjiInput');
        const searchBtn = document.getElementById('searchBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const dbBtn = document.getElementById('dbBtn');
        
        const resultsContainer = document.getElementById('resultsContainer');
 
        const settingsOverlay = document.getElementById('settingsOverlay');
        const scriptUrlInput = document.getElementById('scriptUrlInput');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        
        const dbOverlay = document.getElementById('dbOverlay');
        const closeDbBtn = document.getElementById('closeDbBtn');
        const dbTableBody = document.getElementById('dbTableBody');
        const refreshDbBtn = document.getElementById('refreshDbBtn');
        
        const toast = document.getElementById('toast');

        // --- KONFIGURACJA ---
        // Możesz wkleić tutaj bezpośrednio swój URL wdrożenia Google Apps Script:
        const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx66jT_-gTSnDsllyP8bCw08hJNrF282_ewtl8oVmPf4UP0aK8_iK82g1wivOET7YIb3A/exec';

        let currentKanji = '';
        let cachedDb = [];

        // Load Settings
        scriptUrlInput.value = localStorage.getItem('gas_script_url') || (DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA' ? DEFAULT_SCRIPT_URL : '');

        function getScriptUrl() {
            const localUrl = localStorage.getItem('gas_script_url');
            if (localUrl) return localUrl;
            if (DEFAULT_SCRIPT_URL && DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA') {
                return DEFAULT_SCRIPT_URL;
            }
            return '';
        }

        async function loadDatabaseCache(silent = false) {
            const scriptUrl = getScriptUrl();
            if (!scriptUrl) return;

            try {
                const response = await fetch(scriptUrl + '?action=all');
                const result = await response.json();
                if (result && result.status === 'success' && Array.isArray(result.data)) {
                    cachedDb = result.data;
                    if (!silent) {
                        showToast('Zsynchronizowano pamięć podręczną.');
                    }
                } else {
                    console.error('Błąd pobierania bazy danych:', result ? result.message : 'brak danych');
                    if (!silent) {
                        showToast('Błąd synchronizacji.');
                    }
                }
            } catch (err) {
                console.error('Błąd połączenia z bazą danych:', err);
                if (!silent) {
                    showToast('Błąd połączenia z bazą.');
                }
            }
        }

        // Actions
        function extractKanji(text) {
            const regex = /[\u4e00-\u9faf\u3400-\u4dbf]/g;
            const matches = text.match(regex);
            if (!matches) return [];
            return Array.from(new Set(matches));
        }

        function updateCombinationSection(cardElement, bodyElement, extraArray) {
            bodyElement.innerHTML = '';
            cardElement.style.display = 'none';
            if (!extraArray || !Array.isArray(extraArray)) return;
            
            let hasData = false;
            extraArray.forEach(val => {
                if (val && val.trim() !== '') {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.textContent = val.trim();
                    tr.appendChild(td);
                    bodyElement.appendChild(tr);
                    hasData = true;
                }
            });
            if (hasData) {
                cardElement.style.display = 'block';
            }
        }

        // Tworzenie dynamicznej karty edycji dla danego Kanji
        function createKanjiCard(char, item) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.display = 'flex';
            card.style.flexDirection = 'column';
            card.style.gap = '14px';
            
            const displayRow = document.createElement('div');
            displayRow.className = 'kanji-display-row';
            
            const kanjiLarge = document.createElement('div');
            kanjiLarge.className = 'kanji-large';
            kanjiLarge.textContent = char;
            displayRow.appendChild(kanjiLarge);
            
            const kanjiInfo = document.createElement('div');
            kanjiInfo.className = 'kanji-info';
            kanjiInfo.innerHTML = `Zatwierdzony symbol: <strong>${char}</strong><br><span style="color: #64748b;">Wpisz notatkę poniżej.</span>`;
            displayRow.appendChild(kanjiInfo);
            
            card.appendChild(displayRow);
            
            const inputGroupComment = document.createElement('div');
            inputGroupComment.className = 'input-group';
            const textarea = document.createElement('textarea');
            textarea.placeholder = 'Wpisz komentarz dla tego Kanji...';
            textarea.value = (item && item.comment) ? item.comment : '';
            inputGroupComment.appendChild(textarea);
            card.appendChild(inputGroupComment);
            
            const extraContainer = document.createElement('div');
            extraContainer.style.marginTop = '6px';
            extraContainer.style.marginBottom = '6px';
            
            const extraTitle = document.createElement('span');
            extraTitle.className = 'card-title';
            extraTitle.style.fontSize = '12px';
            extraTitle.style.marginBottom = '6px';
            extraTitle.style.display = 'block';
            extraTitle.textContent = 'Dane kombinacji (Kolumny D-I)';
            extraContainer.appendChild(extraTitle);
            
            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = '1fr 1fr';
            grid.style.gap = '8px';
            
            const extraInputs = [];
            const placeholders = ['Kolumna D', 'Kolumna E', 'Kolumna F', 'Kolumna G', 'Kolumna H', 'Kolumna I'];
            for (let i = 0; i < 6; i++) {
                const group = document.createElement('div');
                group.className = 'input-group';
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = placeholders[i];
                input.style.padding = '8px 10px';
                input.style.fontSize = '14px';
                input.value = (item && item.extra && item.extra[i]) ? item.extra[i] : '';
                group.appendChild(input);
                grid.appendChild(group);
                extraInputs.push(input);
            }
            extraContainer.appendChild(grid);
            card.appendChild(extraContainer);
            
            const saveBtn = document.createElement('button');
            saveBtn.innerHTML = '💾 Zapisz do Google Sheets';
            
            const combCard = document.createElement('div');
            combCard.className = 'card';
            combCard.style.marginTop = '-8px';
            combCard.style.display = 'none';
            
            const combTitle = document.createElement('div');
            combTitle.className = 'card-title';
            combTitle.textContent = 'Kombinacja';
            combCard.appendChild(combTitle);
            
            const combTable = document.createElement('table');
            combTable.className = 'combination-table';
            const combTableBody = document.createElement('tbody');
            combTable.appendChild(combTableBody);
            combCard.appendChild(combTable);
            
            saveBtn.addEventListener('click', async () => {
                saveBtn.disabled = true;
                saveBtn.textContent = 'Zapisywanie...';
                const comment = textarea.value.trim();
                const extra = extraInputs.map(input => input.value.trim());
                try {
                    const resData = await saveKanji(char, comment, extra);
                    let message = 'Zapisano w Google Sheets!';
                    if (resData && resData.message) {
                        message = resData.message;
                    }
                    showToast(message);
                    
                    await loadDatabaseCache(true); // aktualizacja cache
                    updateCombinationSection(combCard, combTableBody, extra);
                } catch (err) {
                    alert('Wystąpił błąd podczas wysyłania: ' + err.message);
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '💾 Zapisz do Google Sheets';
                }
            });
            
            card.appendChild(saveBtn);
            
            updateCombinationSection(combCard, combTableBody, (item && item.extra) ? item.extra : []);
            
            resultsContainer.appendChild(card);
            resultsContainer.appendChild(combCard);
        }

        async function performSearch() {
            const query = kanjiInput.value.trim();
            if (!query) {
                alert('Wpisz najpierw symbol Kanji lub słowo.');
                return;
            }
            
            // Wyodrębnienie poszczególnych Kanji
            let kanjiList = extractKanji(query);
            if (kanjiList.length === 0) {
                // Jeśli brak znaków Kanji w zapytaniu, traktujemy całą frazę jako jedno zapytanie
                kanjiList.push(query);
            }
            
            resultsContainer.innerHTML = '';
            
            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                kanjiList.forEach(k => openWaniKani(k));
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = '🔍 Szukanie w bazie...';

            try {
                let cacheUpdated = false;
                
                for (const char of kanjiList) {
                    const foundItem = cachedDb.find(item => item.kanji.toString().trim() === char);
                    
                    if (foundItem) {
                        createKanjiCard(char, foundItem);
                    } else {
                        // Nie ma w bazie - autozapis do arkusza i otwarcie WK
                        showToast(`Brak "${char}" w bazie. Dodawanie i otwieranie WK...`);
                        try {
                            await saveKanji(char, '', ["", "", "", "", "", ""]);
                            cacheUpdated = true;
                        } catch (saveErr) {
                            console.error('Błąd autozapisu dla:', char, saveErr);
                        }
                        openWaniKani(char);
                    }
                }
                
                if (cacheUpdated) {
                    await loadDatabaseCache(true);
                    // Dorysuj brakujące karty na bazie zaktualizowanego cache
                    kanjiList.forEach(char => {
                        const alreadyRendered = Array.from(resultsContainer.querySelectorAll('.kanji-large'))
                            .some(el => el.textContent === char);
                        if (!alreadyRendered) {
                            const foundItem = cachedDb.find(item => item.kanji.toString().trim() === char);
                            createKanjiCard(char, foundItem);
                        }
                    });
                }
                
                showToast('Wyszukiwanie zakończone.');
            } catch (err) {
                console.error(err);
                showToast('Błąd bazy danych.');
                kanjiList.forEach(k => openWaniKani(k));
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Szukaj w WaniKani';
            }
        }

        function openWaniKani(kanji) {
            const targetUrl = `https://www.wanikani.com/kanji/${encodeURIComponent(kanji)}`;
            window.open(targetUrl, '_blank');
        }

        searchBtn.addEventListener('click', performSearch);
        kanjiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Helper to save Kanji to Google Sheets
        async function saveKanji(kanji, comment, extra) {
            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                throw new Error('Brak skonfigurowanego URL skryptu.');
            }

            const response = await fetch(scriptUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain'
                },
                body: JSON.stringify({
                    kanji: kanji,
                    comment: comment,
                    extra: extra || ["", "", "", "", "", ""]
                })
            });

            try {
                const resData = await response.json();
                return resData;
            } catch (e) {
                return null;
            }
        }

        // Renderowanie tabeli bazy danych z pamięci podręcznej (cachedDb)
        function renderDbTable() {
            dbTableBody.innerHTML = '';
            if (!cachedDb || cachedDb.length === 0) {
                dbTableBody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">Baza danych jest pusta.</td></tr>';
                return;
            }

            cachedDb.forEach(item => {
                const tr = document.createElement('tr');
                
                const tdKanji = document.createElement('td');
                tdKanji.textContent = item.kanji;
                tdKanji.style.fontWeight = 'bold';
                tdKanji.style.color = 'var(--accent-color)';
                tr.appendChild(tdKanji);

                const tdComment = document.createElement('td');
                tdComment.textContent = item.comment || '';
                tr.appendChild(tdComment);

                // Kolumny D-I
                for (let i = 0; i < 6; i++) {
                    const tdExtra = document.createElement('td');
                    tdExtra.textContent = (item.extra && item.extra[i]) ? item.extra[i] : '';
                    tr.appendChild(tdExtra);
                }

                // Kolumna Akcje
                const tdActions = document.createElement('td');
                tdActions.style.display = 'flex';
                tdActions.style.gap = '6px';
                tdActions.style.alignItems = 'center';
                
                // Przycisk WaniKani
                const btnWK = document.createElement('button');
                btnWK.textContent = '🔍 WK';
                btnWK.style.padding = '4px 8px';
                btnWK.style.fontSize = '12px';
                btnWK.style.width = 'auto';
                btnWK.style.background = 'var(--accent-color)';
                btnWK.style.color = '#0f172a';
                btnWK.addEventListener('click', () => {
                    openWaniKani(item.kanji);
                });
                tdActions.appendChild(btnWK);

                // Przycisk Edytuj
                const btnEdit = document.createElement('button');
                btnEdit.textContent = '📝 Edytuj';
                btnEdit.style.padding = '4px 8px';
                btnEdit.style.fontSize = '12px';
                btnEdit.style.width = 'auto';
                btnEdit.style.background = 'rgba(255, 255, 255, 0.1)';
                btnEdit.style.border = '1px solid var(--border-color)';
                btnEdit.style.color = 'var(--text-color)';
                btnEdit.addEventListener('click', () => {
                    // Załaduj do formularza głównego (dynamicznie w resultsContainer)
                    resultsContainer.innerHTML = '';
                    currentKanji = item.kanji;
                    kanjiInput.value = item.kanji;
                    createKanjiCard(item.kanji, item);
                    
                    // Zamknij modal bazy danych
                    dbOverlay.classList.remove('active');
                });
                tdActions.appendChild(btnEdit);

                tr.appendChild(tdActions);

                dbTableBody.appendChild(tr);
            });
        }

        // Otwieranie Bazy (renderowanie natychmiast z pamięci podręcznej)
        dbBtn.addEventListener('click', () => {
            renderDbTable();
            dbOverlay.classList.add('active');
        });

        closeDbBtn.addEventListener('click', () => {
            dbOverlay.classList.remove('active');
        });

        // Ręczne odświeżenie bazy danych z poziomu modalu
        refreshDbBtn.addEventListener('click', async () => {
            refreshDbBtn.disabled = true;
            refreshDbBtn.textContent = '⏳ ...';
            dbTableBody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">Odświeżanie danych...</td></tr>';
            try {
                await loadDatabaseCache(false);
                renderDbTable();
            } catch (err) {
                console.error(err);
            } finally {
                refreshDbBtn.disabled = false;
                refreshDbBtn.textContent = '🔄 Odśwież';
            }
        });

        // Settings Overlay
        settingsBtn.addEventListener('click', () => {
            scriptUrlInput.value = localStorage.getItem('gas_script_url') || (DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA' ? DEFAULT_SCRIPT_URL : '');
            settingsOverlay.classList.add('active');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('active');
        });

        saveSettingsBtn.addEventListener('click', () => {
            localStorage.setItem('gas_script_url', scriptUrlInput.value.trim());
            settingsOverlay.classList.remove('active');
            alert('Zapisano URL skryptu.');
            // Po zmianie URL odświeżamy cache
            loadDatabaseCache(true);
        });

        function showToast(message) {
            if (message) {
                toast.textContent = message;
            } else {
                toast.textContent = "Komentarz zapisany w arkuszu!";
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Ładowanie bazy danych do pamięci podręcznej przy starcie aplikacji
        loadDatabaseCache(true);
    </script>
</body>
</html>
