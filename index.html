<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaniKani Kanji Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --success-color: #10b981;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-settings {
            background: transparent;
            color: var(--text-color);
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 14px;
            color: #94a3b8;
        }

        input[type="text"], textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            width: 100%;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        textarea {
            resize: none;
            height: 110px;
        }

        .kanji-display-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }

        .kanji-large {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.5);
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
        }

        .kanji-info {
            font-size: 14px;
            color: #94a3b8;
        }

        button {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Settings overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-body input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            width: 100%;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        .combination-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }

        .combination-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            background: rgba(15, 23, 42, 0.4);
            font-size: 15px;
            text-align: left;
        }

        .combination-table tr:last-child td {
            border-bottom: none;
        }

        .combination-table tr:hover td {
            background: rgba(15, 23, 42, 0.6);
        }

        .db-table th, .db-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .db-table th {
            background: #1e293b;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .db-table tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Kanji WaniKani Overlay</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="dbBtn" style="background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; width: auto; cursor: pointer; display: flex; align-items: center; gap: 4px;">🗂️ Baza</button>
                <button id="settingsBtn" class="btn-settings" aria-label="Ustawienia">⚙️</button>
            </div>
        </header>

        <!-- Karta 1: Wyszukiwanie -->
        <div class="card">
            <div class="card-title">1. Wyszukaj Kanji</div>
            <div class="input-group">
                <input type="text" id="kanjiInput" placeholder="Wpisz lub wklej Kanji (np. 水)" autocomplete="off">
            </div>
            <button id="searchBtn">🔍 Szukaj w WaniKani</button>
        </div>

        <!-- Karta 2: Komentarz -->
        <div class="card">
            <div class="card-title">2. Dodaj komentarz</div>
            <div class="kanji-display-row">
                <div class="kanji-large" id="kanjiLabel">-</div>
                <div class="kanji-info">
                    Zatwierdzony symbol: <strong id="kanjiText">-</strong><br>
                    <span style="color: #64748b;">Wpisz notatkę poniżej.</span>
                </div>
            </div>
            <div class="input-group">
                <textarea id="commentText" placeholder="Wpisz komentarz dla tego Kanji..."></textarea>
            </div>
            <button id="submitCommentBtn">💾 Zapisz do Google Sheets</button>
        </div>
        
        <!-- Tabela: Kombinacja -->
        <div class="card" id="combinationCard" style="display: none;">
            <div class="card-title">Kombinacja</div>
            <table class="combination-table">
                <tbody id="combinationTableBody">
                    <!-- Wiersze generowane dynamicznie -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Ustawienia Modal -->
    <div id="settingsOverlay" class="overlay">
        <div class="modal">
            <div class="modal-title">Ustawienia Google Sheets</div>
            <div class="modal-body">
                <label for="scriptUrlInput">https://script.google.com/macros/s/AKfycbwQSdPgdIhHCo-TwaOTkB__D1Ck-7f_tWCaKphaWwdqDxbs0lMDDYK6humA8nxzl_aLdA/exec</label>
                <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="closeSettingsBtn">Anuluj</button>
                <button id="saveSettingsBtn">Zapisz</button>
            </div>
        </div>
    </div>

    <!-- Baza Modal -->
    <div id="dbOverlay" class="overlay">
        <div class="modal" style="max-width: 90%; width: 850px; max-height: 85vh; display: flex; flex-direction: column; padding: 20px;">
            <div class="modal-title" style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
                <span>Baza danych Kanji</span>
                <button class="btn-settings" id="closeDbBtn" style="font-size: 18px; padding: 0;">❌</button>
            </div>
            <div style="overflow-x: auto; overflow-y: auto; flex: 1; margin-bottom: 16px; border-radius: 8px; border: 1px solid var(--border-color);">
                <table class="db-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                    <thead>
                        <tr style="background: rgba(15, 23, 42, 0.9); border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 10;">
                            <th style="padding: 10px; font-weight: 600; text-align: left;">Kanji</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">Komentarz</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">D</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">E</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">F</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">G</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">H</th>
                            <th style="padding: 10px; font-weight: 600; text-align: left;">I</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody">
                        <!-- Generowane dynamicznie -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Komentarz zapisany w arkuszu!</div>

    <script>
        const kanjiInput = document.getElementById('kanjiInput');
        const searchBtn = document.getElementById('searchBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const dbBtn = document.getElementById('dbBtn');
        
        const kanjiLabel = document.getElementById('kanjiLabel');
        const kanjiText = document.getElementById('kanjiText');
        const commentText = document.getElementById('commentText');
        const submitCommentBtn = document.getElementById('submitCommentBtn');
        const combinationCard = document.getElementById('combinationCard');
        const combinationTableBody = document.getElementById('combinationTableBody');
 
        const settingsOverlay = document.getElementById('settingsOverlay');
        const scriptUrlInput = document.getElementById('scriptUrlInput');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        
        const dbOverlay = document.getElementById('dbOverlay');
        const closeDbBtn = document.getElementById('closeDbBtn');
        const dbTableBody = document.getElementById('dbTableBody');
        
        const toast = document.getElementById('toast');

        // --- KONFIGURACJA ---
        // Możesz wkleić tutaj bezpośrednio swój URL wdrożenia Google Apps Script:
        const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcxQdnV1bI7WHI6do1wvax8PKUN0OuyBlp7_4AslnCPw4-gBFARY5mwC9lZK9jTlJ-NQ/exec';

        let currentKanji = '';

        // Load Settings
        scriptUrlInput.value = localStorage.getItem('gas_script_url') || (DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA' ? DEFAULT_SCRIPT_URL : '');

        function getScriptUrl() {
            const localUrl = localStorage.getItem('gas_script_url');
            if (localUrl) return localUrl;
            if (DEFAULT_SCRIPT_URL && DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA') {
                return DEFAULT_SCRIPT_URL;
            }
            return '';
        }

        // Actions
        async function performSearch() {
            const query = kanjiInput.value.trim();
            if (!query) {
                alert('Wpisz najpierw symbol Kanji.');
                return;
            }
            
            currentKanji = query;
            kanjiLabel.textContent = query;
            kanjiText.textContent = query;
            commentText.value = ''; // Wyczyszczenie pola komentarza przed nowym wyszukiwaniem
            
            // Czyszczenie tabeli kombinacji
            combinationCard.style.display = 'none';
            combinationTableBody.innerHTML = '';

            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                // Jeśli brak skonfigurowanego URL, od razu otwieramy WaniKani
                openWaniKani(query);
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = '🔍 Szukanie w bazie...';

            try {
                // Zapytanie GET do Google Apps Script
                const url = scriptUrl + '?kanji=' + encodeURIComponent(query);
                const response = await fetch(url);
                const data = await response.json();

                if (data && data.found) {
                    commentText.value = data.comment || '';
                    showToast('Znaleziono notatkę w bazie!');
                    
                    // Renderowanie tabeli kombinacji z kolumn D-I (data.extra)
                    if (data.extra && Array.isArray(data.extra)) {
                        let hasData = false;
                        data.extra.forEach(val => {
                            if (val && val.trim() !== '') {
                                const tr = document.createElement('tr');
                                const td = document.createElement('td');
                                td.textContent = val.trim();
                                tr.appendChild(td);
                                combinationTableBody.appendChild(tr);
                                hasData = true;
                            }
                        });
                        if (hasData) {
                            combinationCard.style.display = 'block';
                        }
                    }
                } else {
                    // Nie znaleziono w bazie. Zapisujemy automatycznie do bazy i otwieramy WaniKani
                    showToast('Brak w bazie. Dodawanie...');
                    try {
                        await saveKanji(query, '');
                        showToast('Dodano Kanji do bazy. Otwieram WaniKani...');
                    } catch (saveErr) {
                        console.error('Błąd podczas autozapisu:', saveErr);
                        showToast('Błąd autozapisu. Otwieram WaniKani...');
                    }
                    openWaniKani(query);
                }
            } catch (err) {
                console.error(err);
                // W przypadku błędu (np. brak sieci, CORS we wdrożeniu testowym) otwieramy WaniKani
                showToast('Błąd bazy. Otwieram WaniKani...');
                openWaniKani(query);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Szukaj w WaniKani';
            }
        }

        function openWaniKani(kanji) {
            const targetUrl = `https://www.wanikani.com/kanji/${encodeURIComponent(kanji)}`;
            window.open(targetUrl, '_blank');
        }

        searchBtn.addEventListener('click', performSearch);
        kanjiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Helper to save Kanji to Google Sheets
        async function saveKanji(kanji, comment) {
            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                throw new Error('Brak skonfigurowanego URL skryptu.');
            }

            const response = await fetch(scriptUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain' // Używamy text/plain by uniknąć problemów CORS preflight
                },
                body: JSON.stringify({
                    kanji: kanji,
                    comment: comment
                })
            });

            try {
                const resData = await response.json();
                return resData;
            } catch (e) {
                return null;
            }
        }

        // Submit Comment
        submitCommentBtn.addEventListener('click', async () => {
            const activeKanji = currentKanji || kanjiInput.value.trim();
            if (!activeKanji) {
                alert('Najpierw wpisz i wyszukaj symbol Kanji.');
                return;
            }

            const comment = commentText.value.trim();
            submitCommentBtn.disabled = true;
            submitCommentBtn.textContent = 'Zapisywanie...';

            try {
                const resData = await saveKanji(activeKanji, comment);
                let message = 'Zapisano w Google Sheets!';
                if (resData && resData.message) {
                    message = resData.message;
                }
                showToast(message);
            } catch (err) {
                alert('Wystąpił błąd podczas wysyłania: ' + err.message);
            } finally {
                submitCommentBtn.disabled = false;
                submitCommentBtn.textContent = '💾 Zapisz do Google Sheets';
            }
        });

        // Baza Overlay
        dbBtn.addEventListener('click', async () => {
            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                alert('Proszę najpierw skonfigurować URL skryptu Google Sheets (kliknij ikonę zębatki w prawym górnym rogu).');
                return;
            }

            dbBtn.disabled = true;
            dbBtn.textContent = '⏳ Pobieranie...';
            dbTableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">Ładowanie danych z bazy...</td></tr>';
            dbOverlay.classList.add('active');

            try {
                const response = await fetch(scriptUrl + '?action=all');
                const result = await response.json();

                if (result && result.status === 'success' && Array.isArray(result.data)) {
                    dbTableBody.innerHTML = '';
                    if (result.data.length === 0) {
                        dbTableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">Baza danych jest pusta.</td></tr>';
                    } else {
                        result.data.forEach(item => {
                            const tr = document.createElement('tr');
                            
                            const tdKanji = document.createElement('td');
                            tdKanji.textContent = item.kanji;
                            tdKanji.style.fontWeight = 'bold';
                            tdKanji.style.color = 'var(--accent-color)';
                            tr.appendChild(tdKanji);

                            const tdComment = document.createElement('td');
                            tdComment.textContent = item.comment || '';
                            tr.appendChild(tdComment);

                            // Kolumny D-I
                            for (let i = 0; i < 6; i++) {
                                const tdExtra = document.createElement('td');
                                tdExtra.textContent = (item.extra && item.extra[i]) ? item.extra[i] : '';
                                tr.appendChild(tdExtra);
                            }

                            dbTableBody.appendChild(tr);
                        });
                    }
                } else {
                    dbTableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px; color: #ef4444;">Nie udało się pobrać danych z bazy.</td></tr>';
                }
            } catch (err) {
                console.error(err);
                dbTableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px; color: #ef4444;">Błąd połączenia: ' + err.message + '</td></tr>';
            } finally {
                dbBtn.disabled = false;
                dbBtn.textContent = '🗂️ Baza';
            }
        });

        closeDbBtn.addEventListener('click', () => {
            dbOverlay.classList.remove('active');
        });

        // Settings Overlay
        settingsBtn.addEventListener('click', () => {
            scriptUrlInput.value = localStorage.getItem('gas_script_url') || (DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA' ? DEFAULT_SCRIPT_URL : '');
            settingsOverlay.classList.add('active');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('active');
        });

        saveSettingsBtn.addEventListener('click', () => {
            localStorage.setItem('gas_script_url', scriptUrlInput.value.trim());
            settingsOverlay.classList.remove('active');
            alert('Zapisano URL skryptu.');
        });

        function showToast(message) {
            if (message) {
                toast.textContent = message;
            } else {
                toast.textContent = "Komentarz zapisany w arkuszu!";
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
