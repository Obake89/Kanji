<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaniKani Kanji Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --success-color: #10b981;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-settings {
            background: transparent;
            color: var(--text-color);
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 14px;
            color: #94a3b8;
        }

        input[type="text"], textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            width: 100%;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        textarea {
            resize: none;
            height: 110px;
        }

        .kanji-display-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }

        .kanji-large {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.5);
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
        }

        .kanji-info {
            font-size: 14px;
            color: #94a3b8;
        }

        button {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Settings overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-body input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            width: 100%;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Kanji WaniKani Overlay</h1>
            <button id="settingsBtn" class="btn-settings" aria-label="Ustawienia">⚙️</button>
        </header>

        <!-- Karta 1: Wyszukiwanie -->
        <div class="card">
            <div class="card-title">1. Wyszukaj Kanji</div>
            <div class="input-group">
                <input type="text" id="kanjiInput" placeholder="Wpisz lub wklej Kanji (np. 水)" autocomplete="off">
            </div>
            <button id="searchBtn">🔍 Szukaj w WaniKani</button>
        </div>

        <!-- Karta 2: Komentarz -->
        <div class="card">
            <div class="card-title">2. Dodaj komentarz</div>
            <div class="kanji-display-row">
                <div class="kanji-large" id="kanjiLabel">-</div>
                <div class="kanji-info">
                    Zatwierdzony symbol: <strong id="kanjiText">-</strong><br>
                    <span style="color: #64748b;">Wpisz notatkę poniżej.</span>
                </div>
            </div>
            <div class="input-group">
                <textarea id="commentText" placeholder="Wpisz komentarz dla tego Kanji..."></textarea>
            </div>
            <button id="submitCommentBtn">💾 Zapisz do Google Sheets</button>
        </div>
    </div>

    <!-- Ustawienia Modal -->
    <div id="settingsOverlay" class="overlay">
        <div class="modal">
            <div class="modal-title">Ustawienia Google Sheets</div>
            <div class="modal-body">
                <label for="scriptUrlInput">URL wdrożenia Google Apps Script Web App:</label>
                <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="closeSettingsBtn">Anuluj</button>
                <button id="saveSettingsBtn">Zapisz</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Komentarz zapisany w arkuszu!</div>

    <script>
        const kanjiInput = document.getElementById('kanjiInput');
        const searchBtn = document.getElementById('searchBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        
        const kanjiLabel = document.getElementById('kanjiLabel');
        const kanjiText = document.getElementById('kanjiText');
        const commentText = document.getElementById('commentText');
        const submitCommentBtn = document.getElementById('submitCommentBtn');

        const settingsOverlay = document.getElementById('settingsOverlay');
        const scriptUrlInput = document.getElementById('scriptUrlInput');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const toast = document.getElementById('toast');

        // --- KONFIGURACJA ---
        // Możesz wkleić tutaj bezpośrednio swój URL wdrożenia Google Apps Script:
        const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcxQdnV1bI7WHI6do1wvax8PKUN0OuyBlp7_4AslnCPw4-gBFARY5mwC9lZK9jTlJ-NQ/exec';

        let currentKanji = '';

        // Load Settings
        scriptUrlInput.value = localStorage.getItem('gas_script_url') || (DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA' ? DEFAULT_SCRIPT_URL : '');

        function getScriptUrl() {
            const localUrl = localStorage.getItem('gas_script_url');
            if (localUrl) return localUrl;
            if (DEFAULT_SCRIPT_URL && DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA') {
                return DEFAULT_SCRIPT_URL;
            }
            return '';
        }

        // Actions
        async function performSearch() {
            const query = kanjiInput.value.trim();
            if (!query) {
                alert('Wpisz najpierw symbol Kanji.');
                return;
            }
            
            currentKanji = query;
            kanjiLabel.textContent = query;
            kanjiText.textContent = query;
            commentText.value = ''; // Wyczyszczenie pola komentarza przed nowym wyszukiwaniem

            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                // Jeśli brak skonfigurowanego URL, od razu otwieramy WaniKani
                openWaniKani(query);
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = '🔍 Szukanie w bazie...';

            try {
                // Zapytanie GET do Google Apps Script
                const url = scriptUrl + '?kanji=' + encodeURIComponent(query);
                const response = await fetch(url);
                const data = await response.json();

                if (data && data.found) {
                    commentText.value = data.comment || '';
                    showToast('Znaleziono notatkę w bazie!');
                } else {
                    // Nie znaleziono w bazie, otwieramy WaniKani w nowej karcie
                    showToast('Brak w bazie. Otwieram WaniKani...');
                    openWaniKani(query);
                }
            } catch (err) {
                console.error(err);
                // W przypadku błędu (np. brak sieci, CORS we wdrożeniu testowym) otwieramy WaniKani
                showToast('Błąd bazy. Otwieram WaniKani...');
                openWaniKani(query);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Szukaj w WaniKani';
            }
        }

        function openWaniKani(kanji) {
            const targetUrl = `https://www.wanikani.com/kanji/${encodeURIComponent(kanji)}`;
            window.open(targetUrl, '_blank');
        }

        searchBtn.addEventListener('click', performSearch);
        kanjiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Submit Comment
        submitCommentBtn.addEventListener('click', async () => {
            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                alert('Proszę najpierw skonfigurować URL skryptu Google Sheets (kliknij ikonę zębatki w prawym górnym rogu).');
                return;
            }

            const activeKanji = currentKanji || kanjiInput.value.trim();
            if (!activeKanji) {
                alert('Najpierw wpisz i wyszukaj symbol Kanji.');
                return;
            }

            const comment = commentText.value.trim();
            submitCommentBtn.disabled = true;
            submitCommentBtn.textContent = 'Zapisywanie...';

            try {
                // Wysyłamy POST. Apps Script zaktualizuje wiersz, jeśli Kanji już istnieje, lub doda nowy.
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain' // Używamy text/plain by uniknąć problemów CORS preflight
                    },
                    body: JSON.stringify({
                        kanji: activeKanji,
                        comment: comment
                    })
                });

                // Sprawdzamy odpowiedź jeśli serwer ją zwrócił (przy cors)
                let message = 'Zapisano w Google Sheets!';
                try {
                    const resData = await response.json();
                    if (resData && resData.message) {
                        message = resData.message;
                    }
                } catch (e) {
                    // ignore if no-cors or response not readable
                }

                showToast(message);
            } catch (err) {
                alert('Wystąpił błąd podczas wysyłania: ' + err.message);
            } finally {
                submitCommentBtn.disabled = false;
                submitCommentBtn.textContent = '💾 Zapisz do Google Sheets';
            }
        });

        // Settings Overlay
        settingsBtn.addEventListener('click', () => {
            scriptUrlInput.value = localStorage.getItem('gas_script_url') || (DEFAULT_SCRIPT_URL !== 'TUTAJ_WKLEJ_SWOJ_URL_WDROZENIA' ? DEFAULT_SCRIPT_URL : '');
            settingsOverlay.classList.add('active');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('active');
        });

        saveSettingsBtn.addEventListener('click', () => {
            localStorage.setItem('gas_script_url', scriptUrlInput.value.trim());
            settingsOverlay.classList.remove('active');
            alert('Zapisano URL skryptu.');
        });

        function showToast(message) {
            if (message) {
                toast.textContent = message;
            } else {
                toast.textContent = "Komentarz zapisany w arkuszu!";
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
